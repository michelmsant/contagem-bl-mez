<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0D47A1">
    <title>Contagem BL_MEZ - Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <!-- Tela de Login -->
            <div id="loginScreen">
                <div class="login-header">
                    <div class="login-logo">📦</div>
                    <h1>CONTAGEM BL_MEZ</h1>
                    <p>Sistema de contagem de estoque</p>
                </div>
                
                <div class="error-message" id="loginError"></div>
                
                <div class="form-group">
                    <label>Usuário</label>
                    <input type="text" id="loginUsuario" placeholder="Digite seu usuário" autocomplete="username">
                </div>
                
                <div class="form-group">
                    <label>Senha</label>
                    <input type="password" id="loginSenha" placeholder="Digite sua senha" autocomplete="current-password">
                </div>
                
                <button class="btn btn-primary" id="btnLogin">
                    🔐 Entrar
                </button>
                
                <div class="login-footer">
                    Não tem conta? <a id="showCadastro">Cadastre-se</a>
                </div>
            </div>
            
            <!-- Tela de Cadastro -->
            <div id="cadastroScreen" style="display: none;">
                <div class="login-header">
                    <div class="login-logo">📝</div>
                    <h1>Novo Cadastro</h1>
                    <p>Crie sua conta de acesso</p>
                </div>
                
                <div class="error-message" id="cadastroError"></div>
                <div class="success-message" id="cadastroSuccess" style="display:none; background: var(--green-light); color: var(--green); padding: 10px 16px; border-radius: var(--radius-sm); font-size: 0.85rem; margin-bottom: 16px;"></div>
                
                <div class="form-group">
                    <label>Nome Completo</label>
                    <input type="text" id="cadastroNome" placeholder="Digite seu nome completo">
                </div>
                
                <div class="form-group">
                    <label>Usuário</label>
                    <input type="text" id="cadastroUsuario" placeholder="Escolha um nome de usuário">
                </div>
                
                <div class="form-group">
                    <label>Senha</label>
                    <input type="password" id="cadastroSenha" placeholder="Crie uma senha">
                </div>
                
                <div class="form-group">
                    <label>Confirmar Senha</label>
                    <input type="password" id="cadastroConfirmarSenha" placeholder="Confirme sua senha">
                </div>
                
                <button class="btn btn-success" id="btnCadastrar">
                    ✅ Criar Conta
                </button>
                
                <button class="btn btn-outline" id="showLogin">
                    ← Voltar para Login
                </button>
            </div>
        </div>
    </div>
    
    <div id="toastContainer"></div>

    <script src="js/auth.js"></script>
    <script src="js/utils.js"></script>
    <script>
        // ============================================================
        // CONTROLE DE LOGIN E CADASTRO
        // ============================================================
        
        document.addEventListener('DOMContentLoaded', () => {
            
            // Elementos da tela de login
            const loginScreen = document.getElementById('loginScreen');
            const cadastroScreen = document.getElementById('cadastroScreen');
            const loginError = document.getElementById('loginError');
            const cadastroError = document.getElementById('cadastroError');
            const cadastroSuccess = document.getElementById('cadastroSuccess');
            
            // Verificar se já está logado
            const currentUser = Auth.getCurrentUser();
            if (currentUser) {
                window.location.href = 'app.html';
                return;
            }
            
            // Alternar entre login e cadastro
            document.getElementById('showCadastro').addEventListener('click', (e) => {
                e.preventDefault();
                loginScreen.style.display = 'none';
                cadastroScreen.style.display = 'block';
                loginError.classList.remove('show');
            });
            
            document.getElementById('showLogin').addEventListener('click', (e) => {
                e.preventDefault();
                cadastroScreen.style.display = 'none';
                loginScreen.style.display = 'block';
                cadastroError.classList.remove('show');
                cadastroSuccess.style.display = 'none';
            });
            
            // Login
            document.getElementById('btnLogin').addEventListener('click', () => {
                const usuario = document.getElementById('loginUsuario').value;
                const senha = document.getElementById('loginSenha').value;
                
                if (!usuario || !senha) {
                    loginError.textContent = 'Preencha todos os campos.';
                    loginError.classList.add('show');
                    return;
                }
                
                const resultado = Auth.login(usuario, senha);
                
                if (resultado.sucesso) {
                    loginError.classList.remove('show');
                    Utils.showToast(resultado.mensagem, 'success');
                    
                    // Redirecionar após login
                    setTimeout(() => {
                        window.location.href = 'app.html';
                    }, 800);
                } else {
                    loginError.textContent = resultado.mensagem;
                    loginError.classList.add('show');
                }
            });
            
            // Login com Enter
            document.getElementById('loginSenha').addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    document.getElementById('btnLogin').click();
                }
            });
            
            document.getElementById('loginUsuario').addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    document.getElementById('loginSenha').focus();
                }
            });
            
            // Cadastro
            document.getElementById('btnCadastrar').addEventListener('click', () => {
                const nome = document.getElementById('cadastroNome').value;
                const usuario = document.getElementById('cadastroUsuario').value;
                const senha = document.getElementById('cadastroSenha').value;
                const confirmarSenha = document.getElementById('cadastroConfirmarSenha').value;
                
                // Resetar mensagens
                cadastroError.classList.remove('show');
                cadastroSuccess.style.display = 'none';
                
                // Validações
                if (!nome || !usuario || !senha || !confirmarSenha) {
                    cadastroError.textContent = 'Preencha todos os campos.';
                    cadastroError.classList.add('show');
                    return;
                }
                
                if (senha !== confirmarSenha) {
                    cadastroError.textContent = 'As senhas não conferem.';
                    cadastroError.classList.add('show');
                    return;
                }
                
                const resultado = Auth.cadastrar(nome, usuario, senha);
                
                if (resultado.sucesso) {
                    cadastroSuccess.textContent = resultado.mensagem + ' Redirecionando para login...';
                    cadastroSuccess.style.display = 'block';
                    
                    // Limpar campos
                    document.getElementById('cadastroNome').value = '';
                    document.getElementById('cadastroUsuario').value = '';
                    document.getElementById('cadastroSenha').value = '';
                    document.getElementById('cadastroConfirmarSenha').value = '';
                    
                    // Voltar para login após 2 segundos
                    setTimeout(() => {
                        cadastroScreen.style.display = 'none';
                        loginScreen.style.display = 'block';
                        cadastroSuccess.style.display = 'none';
                        document.getElementById('loginUsuario').focus();
                    }, 2000);
                } else {
                    cadastroError.textContent = resultado.mensagem;
                    cadastroError.classList.add('show');
                }
            });
            
            // Foco inicial
            document.getElementById('loginUsuario').focus();
        });
    </script>
</body>
</html>
